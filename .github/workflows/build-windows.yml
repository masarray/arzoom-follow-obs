name: Build Windows

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: |
          ./scripts/build-local-windows.ps1 -VisualStudio 2022 -Ci

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: arzoom-windows-x64
          path: |
            release/*.zip
            release/*.exe
          if-no-files-found: error
